<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nuevo producto - Riffy</title>

    <!-- Enlace Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- Enlace boostrap CSS-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Main-CSS -->
    <link rel="stylesheet" th:href="@{/css/main-estilos.css}">

    <!-- Enlace Boostrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- jQuery -->
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>

    <!-- Main JS -->
    <script defer th:src="@{/js/js-main.js}"></script>

    <!-- Riffy favicon -->
    <link rel="icon" type="image/ico" th:href="@{/img/riffy_favicon.ico}">
</head>

<body>

    <!-- Nav — mismo fragmento que el resto de páginas del home -->
    <div th:replace="~{fragmentos/nav-home :: nav-home}"></div>

    <!-- Contenido principal — mismo padding que home-main -->
    <main class="home-main">
        <section class="mis-productos-seccion">
            <div class="container contenedor-crear-producto">

                <div class="mb-4">
                    <h2 class="display-5 fw-bold titulo-seccion">
                        <i class="fas fa-compact-disc me-2 icono-titulo"></i>
                        Nuevo producto
                    </h2>
                </div>

                <form action="/nuevo-producto" method="post" enctype="multipart/form-data">

                    <div class="card rounded-4 shadow-sm border-0">
                        <div class="card-body p-4">

                            <div class="campo-formulario">
                                <label for="titulo">Título</label>
                                <input type="text" id="titulo" name="titulo" placeholder="Ej. Lover" required />
                            </div>

                            <div class="campo-formulario">
                                <label for="artista">Artista</label>
                                <input type="text" id="artista" name="artista" placeholder="Ej. Taylor Swift"
                                    required />
                            </div>

                            <hr class="my-3" />

                            <div class="campo-formulario">
                                <label for="descripcion">Descripción</label>
                                <textarea id="descripcion" name="descripcion" rows="3"
                                    placeholder="Estado, edición, detalles..."></textarea>
                            </div>

                            <hr class="my-3" />

                            <div class="row g-3">
                                <div class="w-50 campo-formulario mb-0">
                                    <label for="categoria">Categoría</label>
                                    <select id="categoria" name="categoria" required>
                                        <option value="" disabled selected>Selecciona...</option>
                                        <option th:each="cat : ${categorias}" th:value="${cat}" th:text="${cat}">
                                        </option>
                                    </select>
                                </div>
                                <div class="w-50 campo-formulario mb-0">
                                    <label for="formato">Condición</label>
                                    <select id="formato" name="formato" required>
                                        <option value="" disabled selected>Selecciona...</option>
                                        <option th:each="f : ${formatos}" th:value="${f}" th:text="${f}"></option>
                                    </select>
                                </div>
                            </div>

                            <hr class="my-3" />

                            <!-- cambia esto en el HTML -->
                            <div class="campo-precio">
                                <label for="precio">Precio</label>
                                <div class="precio-wrapper">
                                    <span class="simbolo-euro">€</span>
                                    <input type="number" id="precio" name="precio" min="0" step="0.01"
                                        placeholder="0.00" required />
                                </div>
                            </div>

                            <hr class="my-3" />

                            <div class="campo-formulario mb-0">
                                <label for="imagenes">Imágenes</label>
                                <input type="file" id="imagenes" name="imagenes" class="form-control" accept="image/*"
                                    multiple />
                            </div>

                        </div>

                        <div class="card-footer bg-light d-flex justify-content-end gap-2 px-4 py-3 rounded-bottom-4">
                            <a href="/home" class="btn btn-outline-secondary btn-sm rounded-pill">Cancelar</a>
                            <button type="submit" class="btn btn-primary btn-sm rounded-pill px-3">
                                <i class="fas fa-tag me-1"></i> Crear
                            </button>
                        </div>
                    </div>

                </form>
            </div>
        </section>
    </main>

</body>

</html>
