<body th:fragment="nav-home">
    <header>
        <nav class="navbar navbar-expand-lg navbar-light fixed-top shadow-sm" id="mainNav">
            <div class="container-fluid px-4 d-flex align-items-center justify-content-between">

                <!-- IZQUIERDA: Logo -->
                <a class="navbar-brand fw-bold d-flex align-items-center gap-2" th:href="@{/home}" title="Riffy"
                    id="pack_riffy_logo">
                    <img th:src="@{/img/riffy_logo.png}" alt="Logo de Riffy" id="logoRiffy">
                    Riffy
                </a>

                <!-- CENTRO: Buscador -->
                <div class="nav-search-wrapper d-none d-lg-flex justify-content-center flex-grow-1 mx-4">
                    <form class="nav-search-form d-flex w-100" th:action="@{/buscar}" method="get">
                        <div class="input-group">
                            <span class="input-group-text bg-white border-end-0">
                                <i class="fas fa-search text-muted"></i>
                            </span>
                            <input class="form-control border-start-0 ps-0" type="search" name="q"
                                placeholder="Buscar CDs, vinilos..." aria-label="Buscar">
                        </div>
                    </form>
                </div>

                <!-- DERECHA: Dropdown usuario -->
                <div class="d-none d-lg-flex align-items-center">
                    <div class="dropdown">

                            class="btn btn-outline-secondary rounded-pill px-3 d-flex align-items-center gap-2 dropdown-toggle"
                            type="button" id="userDropdown" data-bs-toggle="dropdown" aria-expanded="false">
                            <i class="fas fa-user-circle nav-user-icon"></i>
                            <span class="small fw-semibold" th:text="${nombreCompletoUsuario}">Usuario</span>
                        </button>
                        <ul class="dropdown-menu dropdown-menu-end shadow-sm mt-2" aria-labelledby="userDropdown">
                            <li>
                                <a class="dropdown-item d-flex align-items-center gap-2" th:href="@{/vender}">
                                    <i class="fas fa-tag text-primary"></i> Vender
                                </a>
                            </li>
                            <li>
                                <hr class="dropdown-divider">
                            </li>
                            <li>
                                <a class="dropdown-item d-flex align-items-center gap-2" th:href="@{/configuracion}">
                                    <i class="fas fa-cog"></i> Configuración
                                </a>
                            </li>
                            <li>
                                <a class="dropdown-item d-flex align-items-center gap-2" th:href="@{/perfil/editar}">
                                    <i class="fas fa-user-edit"></i> Editar perfil
                                </a>
                            </li>
                            <li>
                                <a class="dropdown-item d-flex align-items-center gap-2" th:href="@{/ayuda}">
                                    <i class="fas fa-question-circle"></i> Ayuda al usuario
                                </a>
                            </li>
                            <li>
                                <hr class="dropdown-divider">
                            </li>
                            <li>
                                <a class="dropdown-item d-flex align-items-center gap-2 dropdown-item-danger"
                                    th:href="@{/logout}">
                                    <i class="fas fa-sign-out-alt"></i> Cerrar sesión
                                </a>
                            </li>
                        </ul>
                    </div>
                </div>
