<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home - Riffy</title>

    <!-- Enlace Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- Enlace boostrap CSS-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Main-CSS -->
    <link rel="stylesheet" th:href="@{/css/main-estilos.css}">

    <!-- Enlace Boostrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- jQuery -->
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>

    <!-- Main JS -->
    <script defer th:src="@{/js/js-main.js}"></script>

    <!-- Riffy favicon -->
    <link rel="icon" type="image/ico" th:href="@{/img/riffy_favicon.ico}">
</head>

<body>
    <!-- Fragmento de header -->
    <!-- <div th:replace="~{fragmentos/nav-home :: nav-home}"></div> -->

    <main>
        <h1>Mis productos</h1>
        <p>CASDHBDSHKFDSA</p>
        <!-- Iterar una lista de productos -->
        <div th:each="producto : ${productos}" th:class="'carousel-item' + (iterStat.first ? ' active' : '')">
            <div id="carouselProductos" class="carousel slide" data-bs-ride="carousel" data-bs-touch="false">
                <div class="carousel-inner">


                    <!-- Imagen del producto (ruta corregida) -->
                    <img th:if="${producto.imagenes != null}" th:src="@{/img/productos_img/{producto.imagenes}}"
                        class="d-block w-100" th:alt="'Portada de ' + ${producto.titulo}">


                    <!-- Opcional: texto superpuesto (título y artista) -->
                    <div class="carousel-caption d-none d-md-block bg-dark bg-opacity-50 rounded p-2">
                        <h5 th:text="${producto.titulo}">Título</h5>
                        <p th:text="${producto.artista}">Artista</p>
                        <p class="fw-bold" th:text="'$' + ${producto.precio}">Precio</p>
                    </div>

                </div>

                <!-- Controles prev/next -->
                <button class="carousel-control-prev" type="button" data-bs-target="#carouselProductos"
                    data-bs-slide="prev">
                    <span class="carousel-control-prev-icon" aria-hidden="true"></span>
                    <span class="visually-hidden">Anterior</span>
                </button>
                <button class="carousel-control-next" type="button" data-bs-target="#carouselProductos"
                    data-bs-slide="next">
                    <span class="carousel-control-next-icon" aria-hidden="true"></span>
                    <span class="visually-hidden">Siguiente</span>
                </button>
            </div>
        </div>


    </main>
</body>

</html>
